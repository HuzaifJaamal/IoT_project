<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="100%" height="100%" fill="white"/>
    <defs>
        <linearGradient id="thermoFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#72dbff"/>
            <stop offset="100%" stop-color="#31b8e8"/>
        </linearGradient>

        <style>
            .trackText {
            font-family: "Arial Black", Arial, Helvetica, sans-serif;
            font-size: 95px;
            font-weight: 900;
            fill: #0c2f47;
            letter-spacing: -3px;
            }
        </style>
    </defs>

    <!-- Flame -->
    <!-- Simple flame -->
    <g transform="translate(42,6)">
        <path d="M35 12
           C48 -2, 72 4, 74 28
           C86 22, 96 34, 94 52
           C92 73, 74 90, 52 98
           C58 80, 52 64, 39 51
           C26 38, 24 22, 35 12Z"
            fill="#67d7f7"/>
    </g>
    <!-- Left stylized T -->
    <path d="M10 65h75l-7 23H58l-17 80H10l17-84H5z" fill="#0c2f47"/>

    <!-- Thermometer -->
    <g transform="translate(94,40)">
        <!-- outer -->
        <rect x="0" y="0" width="38" height="116" rx="19" fill="#0c2f47"/>
        <circle cx="19" cy="132" r="30" fill="#0c2f47"/>

        <!-- inner white -->
        <rect x="8" y="8" width="22" height="108" rx="11" fill="#ffffff"/>
        <circle cx="19" cy="132" r="20" fill="#ffffff"/>

        <!-- blue fill -->
        <rect x="13" y="34" width="12" height="84" rx="6" fill="url(#thermoFill)"/>
        <circle cx="19" cy="132" r="17" fill="url(#thermoFill)"/>
    </g>

    <!-- Text -->
    <text x="140" y="144" class="trackText">track</text>
</svg>